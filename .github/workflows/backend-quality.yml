name: Backend Quality

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Pytest
        run: pytest -q

      - name: Import Linter
        run: lint-imports

      - name: Vulture
        continue-on-error: true
        run: vulture app tests --min-confidence 80

      - name: Radon
        continue-on-error: true
        run: radon cc app -s -n B
