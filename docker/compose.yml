services:
  neo4j:
    image: neo4j:5.22
    container_name: holocron-neo4j
    environment:
      NEO4J_AUTH: neo4j/changeme123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: holocron-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - ../backend/.env.example
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app

  frontend:
    build:
      context: ../frontend
    container_name: holocron-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend/app:/app/app
      - ../frontend/components:/app/components
      - ../frontend/lib:/app/lib

volumes:
  neo4j_data:
